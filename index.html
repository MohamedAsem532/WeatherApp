<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="" href="images/clouds.png" />
  </head>
  <body>
    <div class="app-container">
      <h1 class="app-title">Weather App</h1>
    </div>
    <div class="card">
      <div class="search">
        <input
          type="text"
          placeholder="Enter Your City Name"
          spellcheck="false"
        />
        <button>
          <img src="images/search.png" alt="" />
        </button>
      </div>
      <div class="error">
        <p>Invalid City Name</p>
      </div>
      <div class="weather">
        <img src="images/rain.png" class="weather-icon" />
        <h1 class="temp">22°C</h1>
        <h2 class="city">Cairo</h2>
        <div class="details">
          <div class="col">
            <img src="images/humidity.png" />
            <div>
              <p class="humidity">50%</p>
              <p>Humidity</p>
            </div>
          </div>
          <div class="col">
            <img src="images/wind.png" />
            <div>
              <p class="wind">15 km/hr</p>
              <p>Wind Speed</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const apiKey = "d9cdacbdc84da96a1e7921cbbd5272e9"; // from openWeatherMap site
      const apiUrl =
        "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

      const searchBox = document.querySelector(".search input");
      const searchBtn = document.querySelector(".search button");
      const weatherIcn = document.querySelector(".weather-icon");

      async function checkWeather(city) {
        try {
          const response = await fetch(apiUrl + city + `&appid=${apiKey}`);
          const result = await response.json(); // convert by JSON the data into readable format
          console.log(result);

          if (result.weather[0].main === "Clouds") {
            weatherIcn.src = "images/clouds.png";
          } else if (result.weather[0].main === "Rain") {
            weatherIcn.src = "images/rain.png";
          } else if (result.weather[0].main === "Clear") {
            weatherIcn.src = "images/clear.png";
          } else if (result.weather[0].main === "mist") {
            weatherIcn.src = "images/mist.png";
          }
          document.querySelector(".city").innerHTML = result.name;
          document.querySelector(".temp").innerHTML =
            Math.round(result.main.temp) + "°C";
          document.querySelector(".humidity").innerHTML =
            result.main.humidity + " %";
          document.querySelector(".wind").innerHTML =
            result.wind.speed + " km/hr";

          document.querySelector(".weather").style.display = "block";
          document.querySelector(".weather").style.animation = "slideInUp 0.6s ease-out";
        } catch (error) {
          console.error(error);
          document.querySelector(".error").style.display = "block";
        }
      }

      searchBtn.addEventListener("click", () => {
        checkWeather(searchBox.value);
        document.querySelector(".error").style.display = "none";
      });

      searchBox.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          checkWeather(searchBox.value);
          document.querySelector(".error").style.display = "none";
        }
      });
    </script>
  </body>
</html>
